<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>スロunit簿 PR</title>
  <meta name="description" content="スロunit簿 軍団モードPR画像" />
  <meta property="og:title" content="スロunit簿 PR" />
  <meta property="og:description" content="チーム収支、共有で強くなる。" />
  <meta property="og:image" content="preview.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: #06111f; }
    body {
      display: grid;
      place-items: center;
      padding: 18px;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      background:
        radial-gradient(circle at 80% 10%, rgba(16,185,129,.35), transparent 34%),
        radial-gradient(circle at 15% 85%, rgba(37,99,235,.32), transparent 38%),
        #06111f;
    }
    .wrap { width: min(100%, 1200px); }
    img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 18px;
      box-shadow: 0 24px 80px rgba(0,0,0,.48);
    }
    .hint { color: rgba(230,241,252,.72); text-align: center; font-size: 13px; margin-top: 12px; }
  </style>
</head>
<body>
  <main class="wrap">
    <img src="preview.png" alt="スロunit簿 軍団モード PR画像" />
    <div class="hint">長押しで画像保存できます</div>
  </main>
</body>
</html>
